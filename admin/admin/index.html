<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Kodak Logistics</title>
  <link rel="stylesheet" href="admin-style.css">
  <!-- Content Security Policy - Allows connections to backend API -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://kodak-logistics-api.onrender.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <h1>KODAK LOGISTICS</h1>
        <p>Admin Portal</p>
      </div>
      
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required 
                 placeholder="Enter admin username"
                 maxlength="50"
                 autocomplete="off">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required 
                 placeholder="Enter password"
                 autocomplete="off">
        </div>
        
        <button type="submit" class="login-btn" id="loginBtn">Login to Dashboard</button>
        
        <div id="loginError" class="error-message" style="display: none;"></div>
      </form>
      
      <div class="login-footer">
        <p>Secure Admin Access</p>
      </div>
    </div>
  </div>
  
  <script src="admin.js"></script>
</body>
</html>
